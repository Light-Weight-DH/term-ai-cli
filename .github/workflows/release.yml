name: release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths:
      - "bin/**"
      - "src/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            artifact_name: term-ai-macos
          - platform: windows
            runner: windows-latest
            artifact_name: term-ai-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Read package version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Prepare release directory
        shell: bash
        run: |
          RELEASE_DIR="term-ai-${VERSION}-${{ matrix.platform }}"
          mkdir "$RELEASE_DIR"
          cp -R \
            bin \
            src \
            node_modules \
            package.json \
            package-lock.json \
            README.md \
            OFFLINE-INSTALL.md \
            LICENSE \
            "$RELEASE_DIR"/
          echo "RELEASE_DIR=$RELEASE_DIR" >> "$GITHUB_ENV"

      - name: Create macOS archive
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          tar -czf "${RELEASE_DIR}.tar.gz" "$RELEASE_DIR"
          echo "ASSET=${RELEASE_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Create Windows archive
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path $env:RELEASE_DIR -DestinationPath "$env:RELEASE_DIR.zip" -Force
          "ASSET=$env:RELEASE_DIR.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: publish release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Read package version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: release-assets/*
